html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch The Emoji 😂</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ff7eb3,#ff758c,#ff9770);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}

h1{
    font-size:50px;
    margin-bottom:10px;
    text-shadow:0 0 10px white;
}

p{
    font-size:20px;
    margin-bottom:20px;
}

#score{
    font-size:28px;
    margin-bottom:20px;
}

.game-area{
    width:90%;
    height:65vh;
    border:4px solid white;
    border-radius:25px;
    position:relative;
    overflow:hidden;
    backdrop-filter:blur(5px);
}

.emoji{
    position:absolute;
    font-size:50px;
    cursor:pointer;
    user-select:none;
    transition:0.1s;
}

.emoji:hover{
    transform:scale(1.2);
}

button{
    margin-top:20px;
    padding:14px 30px;
    border:none;
    border-radius:30px;
    font-size:20px;
    background:white;
    color:#ff4f81;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

#gameOver{
    display:none;
    margin-top:20px;
    font-size:30px;
    animation:pop 1s infinite alternate;
}

@keyframes pop{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.1);
    }
}

</style>
</head>

<body>

<h1>😂 Catch The Emoji 😂</h1>

<p>Catch emojis before they disappear!</p>

<div id="score">Score: 0</div>

<div class="game-area" id="gameArea"></div>

<button onclick="startGame()">Start Game 🎮</button>

<div id="gameOver"></div>

<script>

const emojis = ["😂","🤣","😎","🤪","🔥","💀","👻","🐸","🍕","🐵"];

let score = 0;
let gameRunning = false;
let gameTime = 20;

function startGame(){

    score = 0;
    gameRunning = true;
    gameTime = 20;

    document.getElementById("score").innerHTML = "Score: 0";
    document.getElementById("gameOver").style.display = "none";

    const gameInterval = setInterval(createEmoji,600);

    const timer = setInterval(()=>{

        gameTime--;

        if(gameTime <= 0){

            clearInterval(gameInterval);
            clearInterval(timer);

            gameRunning = false;

            document.getElementById("gameOver").style.display = "block";

            if(score >= 15){
                document.getElementById("gameOver").innerHTML =
                "🔥 OMG Pro Player! Final Score: " + score;
            }

            else if(score >= 8){
                document.getElementById("gameOver").innerHTML =
                "😎 Nice Skills! Final Score: " + score;
            }

            else{
                document.getElementById("gameOver").innerHTML =
                "😂 Bro Are You Sleeping? Final Score: " + score;
            }

        }

    },1000);

}

function createEmoji(){

    if(!gameRunning) return;

    const emoji = document.createElement("div");

    emoji.classList.add("emoji");

    emoji.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

    const gameArea = document.getElementById("gameArea");

    const x = Math.random() * (gameArea.clientWidth - 60);

    const y = Math.random() * (gameArea.clientHeight - 60);

    emoji.style.left = x + "px";
    emoji.style.top = y + "px";

    emoji.onclick = function(){

        score++;

        document.getElementById("score").innerHTML =
        "Score: " + score;

        emoji.remove();

    };

    gameArea.appendChild(emoji);

    setTimeout(()=>{
        emoji.remove();
    },1200);

}

</script>

</body>
</html>
